<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
    <rect width="1000" height="800" fill="#05070a" />
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 240, 255, 0.05)" stroke-width="1"/>
        </pattern>
        <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="1000" height="800" fill="url(#grid)" />
    
    <!-- Building outline -->
    <path d="M 100,200 L 900,200 L 900,750 L 550,750 L 550,780 L 450,780 L 450,750 L 100,750 Z" fill="rgba(16, 24, 40, 0.5)" stroke="#00f0ff" stroke-width="2" filter="url(#glow)" />
    
    <!-- Walls / Rooms -->
    <rect x="150" y="450" width="150" height="200" fill="rgba(0,0,0,0.5)" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1.5"/>
    <text x="225" y="550" fill="rgba(0, 240, 255, 0.6)" font-family="sans-serif" font-size="20" text-anchor="middle">Admin</text>

    <rect x="700" y="450" width="150" height="200" fill="rgba(0,0,0,0.5)" stroke="rgba(0, 240, 255, 0.4)" stroke-width="1.5"/>
    <text x="775" y="550" fill="rgba(0, 240, 255, 0.6)" font-family="sans-serif" font-size="20" text-anchor="middle">Cafeteria</text>
    
    <!-- Stairs block -->
    <rect x="450" y="320" width="100" height="100" fill="rgba(138, 43, 226, 0.2)" stroke="#8a2be2" stroke-width="2"/>
    <line x1="450" y1="340" x2="550" y2="340" stroke="#8a2be2" stroke-width="1" />
    <line x1="450" y1="360" x2="550" y2="360" stroke="#8a2be2" stroke-width="1" />
    <line x1="450" y1="380" x2="550" y2="380" stroke="#8a2be2" stroke-width="1" />
    <line x1="450" y1="400" x2="550" y2="400" stroke="#8a2be2" stroke-width="1" />
    <text x="500" y="380" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="12" text-anchor="middle">STAIRS</text>

    <rect x="850" y="550" width="50" height="100" fill="rgba(138, 43, 226, 0.2)" stroke="#8a2be2" stroke-width="2"/>
    <text x="875" y="600" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="12" text-anchor="middle" transform="rotate(-90 875,600)">STAIRS</text>
</svg>
